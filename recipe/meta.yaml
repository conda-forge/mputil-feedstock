{% set name = "mputil" %}
{% set version = "0.1.1" %}

package:
  name: '{{ name|lower }}'
  version: '{{ version }}'

source:
  fn: '{{ name }}-{{ version }}.tar.gz'
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  'sha256': '6e510e587cd812055cd1b61eb311894bf5ed1ec1f81ad9b2b3413ef4df8aeb08'

build:
  number: 1
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps -vv

requirements:
  host:
    - pip
  run:
    - python >={{ python_min }}

test:
  requires:
    - python {{ python_min }}
  imports:
    - mputil

about:
  home: https://github.com/rasbt/mputil
  license: MIT
  license_family: MIT
  license_file: LICENSE.txt
  summary: Utility functions for Python's multiprocessing module
  description: mputil is a package that provides utility functions for Python''s multiprocessing standard library module
  doc_url: https://github.com/rasbt/mputil
  dev_url: https://github.com/rasbt/mputil

extra:
  recipe-maintainers:
    - jenzopr
